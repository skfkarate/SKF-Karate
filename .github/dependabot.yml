version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    groups:
      next-react-tooling:
        patterns:
          - next
          - react
          - react-dom
          - eslint*
          - typescript
      runtime-dependencies:
        dependency-type: production
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:30"
      timezone: Asia/Kolkata
