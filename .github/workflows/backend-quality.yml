name: Backend Quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run type-check

      - name: Environment contract
        run: npm run check:env

      - name: Full lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Security audit
        run: npm audit --omit=dev --audit-level=high

      - name: Static asset audit
        run: npm run audit:assets:ci

      - name: Media manifest audit
        run: npm run audit:media-manifest

      - name: Production build
        run: npm run build:ci
        env:
          JWT_SECRET: ci_jwt_secret_32_chars_minimum_value
          NEXTAUTH_SECRET: ci_nextauth_secret_32_chars_min_value

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e
        env:
          JWT_SECRET: ci_jwt_secret_32_chars_minimum_value
          NEXTAUTH_SECRET: ci_nextauth_secret_32_chars_min_value
