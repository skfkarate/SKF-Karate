<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#030508" />
    <title>SKF Karate Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #030508;
        color: #fff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        background:
          radial-gradient(circle at 18% 18%, rgba(214, 40, 40, 0.22), transparent 34rem),
          radial-gradient(circle at 82% 78%, rgba(255, 183, 3, 0.12), transparent 30rem),
          linear-gradient(145deg, #030508 0%, #090b10 52%, #050507 100%);
      }

      main {
        width: min(100%, 34rem);
        text-align: center;
        padding: clamp(2rem, 8vw, 3rem);
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(10, 14, 22, 0.72);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.46);
        backdrop-filter: blur(18px);
      }

      img {
        width: 72px;
        height: 72px;
        margin-bottom: 1.25rem;
        border-radius: 18px;
      }

      .eyebrow {
        margin: 0 0 0.65rem;
        color: #ffb703;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 0.85rem;
        font-size: clamp(2rem, 9vw, 3.6rem);
        line-height: 0.98;
        letter-spacing: 0;
      }

      p {
        margin: 0 auto 1.8rem;
        max-width: 27rem;
        color: rgba(255, 255, 255, 0.76);
        line-height: 1.7;
      }

      button {
        min-height: 44px;
        border: 0;
        border-radius: 999px;
        padding: 0.85rem 1.4rem;
        background: #fff;
        color: #050507;
        font-weight: 850;
        letter-spacing: 0.02em;
        cursor: pointer;
      }

      button:focus-visible {
        outline: 3px solid #ffb703;
        outline-offset: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192.png" alt="SKF Karate" />
      <p class="eyebrow">Connection Lost</p>
      <h1>Back Online Soon</h1>
      <p>Your connection dropped. Public pages you have already opened may still be available from the SKF Karate offline cache.</p>
      <button type="button" onclick="window.location.reload()">Retry Connection</button>
    </main>
  </body>
</html>
